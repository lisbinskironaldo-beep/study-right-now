<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>



<body>

<div id="ambientPlayer" class="ambient-player">

<div id="ambientMain" class="ambient-main">
<span id="ambientIcon">🌧</span>
<span id="ambientTrack">Nenhum som</span>
</div>

<div class="ambient-controls-row">

<div class="ambient-transport">
<button id="ambientPrev">⏮</button>
<button id="ambientPlay">⏯</button>
<button id="ambientNext">⏭</button>
</div>

<div class="ambient-volume">
<input id="ambientVolume" type="range" min="0" max="1" step="0.01">
</div>

</div>

</div>

<div id="ambientPanelNew" class="ambient-panel-new" tabindex="0">
<div id="ambientCategories"></div>

<div id="ambientYoutube" class="ambient-youtube hidden">

<div class="youtube-presets">
  <button data-preset="lofi">Lofi</button>
  <button data-preset="focus">Focus</button>
  <button data-preset="piano">Piano</button>
  <button data-preset="rain">Rain</button>
  <button data-preset="jazz">Jazz</button>
  <button data-preset="ambient">Ambient</button>
  <button data-preset="nature">Nature</button>
  <button data-preset="white">White</button>
</div>

<input id="youtubeSearch"
placeholder="Buscar ambiente no YouTube..."
autocomplete="off">

<div id="youtubeResults"></div>

<div id="youtubeControls" class="youtube-controls">

<div class="yt-buttons">

<button id="ytPrev">⏮</button>
<button id="ytPlayPause">⏯</button>
<button id="ytNext">⏭</button>

</div>

<div class="yt-volume">

<input id="ytVolume" type="range" min="1" max="100" value="50">
</div>

</div>

</div>

<div id="ambientSounds"></div>
</div>

    <div id="customModal" class="custom-modal hidden">
  <div class="custom-box">
    <h2>Pomodoro Personalizado</h2>

    <div id="customRows" class="custom-rows"></div>

    <div class="custom-controls">
      <button class="row-btn right" onclick="Pomodoro.addCustomRow()">+</button>
      <button class="row-btn left" onclick="Pomodoro.removeCustomRow()">−</button>
    </div>

    <button class="save-btn" onclick="Pomodoro.saveCustom()">Salvar</button>
  </div>  
</div>

<div id="miniAnalogClock" class="mini-analog-clock">
    <div class="hand hour"></div>
    <div class="hand minute"></div>
    <div class="hand second"></div>
</div>

<!-- TOP BAR -->
<header class="topbar">
    
    <div class="topbar-left">
    <button id="homeBtn" class="icon-circle" title="Início">🏠</button>

    <select id="timezoneSelector" class="timezone-topbar"></select>
</div>

    <div class="topbar-right">
        <button id="printQtsBtn" class="icon-circle" title="Imprimir Quadro">🖨</button>
        <button id="focusModeBtn" class="icon-circle" title="Modo Foco">🎯</button>
        <button id="fullscreenBtn" class="icon-circle" title="Tela cheia">⛶</button>
        <button id="darkToggle" class="icon-circle" title="Modo noturno">🌙</button>
    </div>
</header>
<div id="sideModules" class="side-modules"></div>


<!-- HERO -->
<section id="hero" class="hero">

    <div id="pomodoroPresets" class="pomodoro-presets"></div>

    <div class="date-display" id="dateDisplay"></div>

    <div class="time-display" id="timeDisplay">00:00:00</div>
    <div id="cycleProgress" class="cycle-progress"></div>

<div class="main-stats-row">
    <div id="weeklyGoal" class="weekly-goal"></div>
    <div id="studyStats" class="study-stats"></div>
    <div id="levelSystem" class="level-system"></div>
</div>

    <div id="streakVisual" class="streak-visual"></div>
    <div id="dailyGoal" class="daily-goal"></div>
    <div id="weeklyChart" class="weekly-chart"></div>
    <div id="sessionLog" class="session-log"></div>
    <div id="advancedStats" class="advanced-stats"></div>
    <div id="achievements" class="achievements"></div>
    <div id="progressiveBars" class="progressive-bars"></div>
    <div class="controls" id="controls">
        <button id="playBtn" class="control-btn" title="Play (enter)">▶</button>
        <button id="pauseBtn" class="control-btn" title="Pause (Espaço)">⏸</button>
        <button id="resetBtn" class="control-btn" title="Reset (Backspace)">↺</button>
    </div>

</section>


<!-- MODULE AREA -->
<main id="moduleArea">

    <section id="alarmModule" class="module"></section>
    <section id="calendarModule" class="module"></section>
    <section id="pomodoroModule" class="module"></section>
    <section id="qtsModule" class="module"></section>

</main>


<!-- FOOTER -->
<footer class="footer">

    <div class="footer-icons">
        <button data-module="alarm" class="icon-circle footer-icon" data-label="Despertador">
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" d="M10 2h4m-2 0v3m-7 5a9 9 0 1114 0c0 4-3 6-7 6s-7-2-7-6z" />
</svg>
</button>

<button data-module="calendar" class="icon-circle footer-icon" data-label="Lembrete">
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<rect x="3" y="4" width="18" height="18" rx="2" />
<path d="M16 2v4M8 2v4M3 10h18" />
</svg>
</button>

<button data-module="stopwatch" class="icon-circle footer-icon"data-label="Cronômetro">
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<circle cx="12" cy="13" r="8" />
<path d="M12 9v4l3 3M9 2h6" />
</svg>
</button>

<button data-module="timer" class="icon-circle footer-icon" data-label="Timer">
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<circle cx="12" cy="13" r="8" />
<path d="M12 13l3-3M9 2h6" />
</svg>
</button>

<button data-module="pomodoro" class="icon-circle footer-icon" data-label="Pomodoro">
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path d="M12 2C9 2 6 5 6 8s3 6 6 6 6-3 6-6-3-6-6-6z" />
<path d="M12 2v4" />
</svg>
</button>

<button data-module="qts" class="icon-circle footer-icon" data-label="Quadro horário">
<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<rect x="3" y="3" width="7" height="7" />
<rect x="14" y="3" width="7" height="7" />
<rect x="14" y="14" width="7" height="7" />
<rect x="3" y="14" width="7" height="7" />
</svg>
</button>
    </div>

    <div class="donate-area">
        <a href="#" id="donateLink">Doar</a>
        <div class="no-ads">Site livre de anúncios e popups!</div>
    </div>

    <div class="footer-divider"></div>

    <div id="worldCarousel" class="world-carousel"></div>

</footer>


<div id="youtubePlayer" style="display:none;"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script src="js/eventBus.js"></script>

<script src="js/clock.js"></script>
<script src="js/timer.js"></script>
<script src="js/alarm.js"></script>
<script src="js/calendar.js"></script>
<script src="js/pomodoro.js"></script>
<script src="js/qts.js"></script>
<script src="js/stats.js"></script>
<script src="js/ambient.js"></script>
<script src="js/app.js"></script>

</body>
</html>
